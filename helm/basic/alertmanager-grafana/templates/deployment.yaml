apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "alertmanager-grafana.alertmanager.fullname" . }}
  labels:
    {{- include "alertmanager-grafana.labels" . | nindent 4 }}
    component: alertmanager
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "alertmanager-grafana.selectorLabels" . | nindent 6 }}
      component: alertmanager
  template:
    metadata:
      labels:
        {{- include "alertmanager-grafana.selectorLabels" . | nindent 8 }}
        component: alertmanager
    spec:
      serviceAccountName: {{ include "alertmanager-grafana.serviceAccountName" . }}
      containers:
        - name: alertmanager
          image: "{{ .Values.alertmanager.image.repository }}:{{ .Values.alertmanager.image.tag }}"
          imagePullPolicy: {{ .Values.alertmanager.image.pullPolicy }}
          ports:
            {{- toYaml .Values.alertmanager.service.ports | nindent 12 }}
          args:
            - '--config.file=/etc/alertmanager/alertmanager.yml'
            - '--storage.path=/alertmanager'
            - '--web.listen-address=:9093'
            - '--log.level=info'
          resources:
            {{- toYaml .Values.alertmanager.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/alertmanager
            - name: storage
              mountPath: /alertmanager
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9093
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9093
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: config
          configMap:
            name: {{ include "alertmanager-grafana.alertmanager.fullname" . }}-config
        - name: storage
        {{- if .Values.alertmanager.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "alertmanager-grafana.alertmanager.fullname" . }}-pvc
        {{- else }}
          emptyDir: {}
        {{- end }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "alertmanager-grafana.alertmanager.fullname" . }}-pvc
  labels:
    {{- include "alertmanager-grafana.labels" . | nindent 4 }}
spec:
  accessModes:
    - {{ .Values.alertmanager.persistence.accessMode | default "ReadWriteOnce" }}
  resources:
    requests:
      storage: {{ .Values.alertmanager.persistence.size | default "1Gi" }}
  {{- if .Values.alertmanager.persistence.storageClass }}
  storageClassName: {{ .Values.alertmanager.persistence.storageClass }}
  {{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "alertmanager-grafana.grafana.fullname" . }}
  labels:
    {{- include "alertmanager-grafana.labels" . | nindent 4 }}
    component: grafana
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "alertmanager-grafana.selectorLabels" . | nindent 6 }}
      component: grafana
  template:
    metadata:
      labels:
        {{- include "alertmanager-grafana.selectorLabels" . | nindent 8 }}
        component: grafana
    spec:
      serviceAccountName: {{ include "alertmanager-grafana.serviceAccountName" . }}
      containers:
        - name: grafana
          image: "{{ .Values.grafana.image.repository }}:{{ .Values.grafana.image.tag }}"
          imagePullPolicy: {{ .Values.grafana.image.pullPolicy }}
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: {{ .Values.grafana.adminUser }}
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: {{ .Values.grafana.adminPassword }}
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
            - name: GF_INSTALL_PLUGINS
              value: {{ .Values.grafana.plugins | join "," }}
          resources:
            {{- toYaml .Values.grafana.resources | nindent 12 }}
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
              readOnly: false
            - name: dashboards
              mountPath: /etc/grafana/provisioning/dashboards
              readOnly: false
            - name: storage
              mountPath: /var/lib/grafana
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: datasources
          configMap:
            name: {{ include "alertmanager-grafana.grafana.fullname" . }}-datasources
        - name: dashboards
          configMap:
            name: {{ include "alertmanager-grafana.grafana.fullname" . }}-dashboards
        - name: storage
        {{- if .Values.grafana.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "alertmanager-grafana.grafana.fullname" . }}-pvc
        {{- else }}
          emptyDir: {}
        {{- end }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "alertmanager-grafana.grafana.fullname" . }}-pvc
  labels:
    {{- include "alertmanager-grafana.labels" . | nindent 4 }}
spec:
  accessModes:
    - {{ .Values.grafana.persistence.accessMode | default "ReadWriteOnce" }}
  resources:
    requests:
      storage: {{ .Values.grafana.persistence.size | default "5Gi" }}
  {{- if .Values.grafana.persistence.storageClass }}
  storageClassName: {{ .Values.grafana.persistence.storageClass }}
  {{- end }}
