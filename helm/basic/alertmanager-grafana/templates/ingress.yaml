{{- if .Values.grafana.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "alertmanager-grafana.grafana.fullname" . }}
  labels:
    {{- include "alertmanager-grafana.labels" . | nindent 4 }}
  annotations:
    {{- toYaml .Values.grafana.ingress.annotations | nindent 4 }}
spec:
  ingressClassName: {{ .Values.grafana.ingress.className }}
  rules:
    {{- range .Values.grafana.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          - path: {{ .paths | default "/" }}
            pathType: Prefix
            backend:
              service:
                name: {{ include "alertmanager-grafana.grafana.fullname" $ }}
                port:
                  number: {{ $.Values.grafana.service.port }}
    {{- end }}
  {{- if .Values.grafana.ingress.tls }}
  tls:
    {{- range .Values.grafana.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
{{- end }}
