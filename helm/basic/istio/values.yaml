replicaCount: 1

istiod:
  image:
    repository: istio/pilot
    pullPolicy: IfNotPresent
    tag: "1.20.0"

  service:
    type: ClusterIP
    ports:
      - name: grpc-xds
        port: 15010
      - name: https-xds
        port: 15012
      - name: http-monitoring
        port: 15014

  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 256Mi

istio_gateway:
  enabled: true
  name: istio-ingressgateway
  image:
    repository: istio/proxyv2
    pullPolicy: IfNotPresent
    tag: "1.20.0"

  service:
    type: LoadBalancer
    ports:
      - name: http
        port: 80
        targetPort: 8080
      - name: https
        port: 443
        targetPort: 8443

  env:
    ISTIO_META_ROUTING_MODE: "shadow-controller"

  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 128Mi

  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 80

security:
  mTLS:
    enabled: true
    mode: STRICT

  jwtPolicy:
    enabled: true
    issuer: "http://oauth-center"

tracing:
  enabled: true
  sampling: 10
  zipkin:
    address: "skywalking-oap:11800"

logging:
  level: "info"

proxy:
  accessLog: true
  logLevel: "warning"

ingress:
  enabled: false
  className: "nginx"
  annotations: {}
  hosts: []
  tls: []

serviceAccount:
  create: true
  annotations: {}

resources: {}

nodeSelector: {}

tolerations: []

affinity: {}
