replicaCount: 1

image:
  repository: apache/rocketmq
  pullPolicy: IfNotPresent
  tag: "5.3.1"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext: {}

securityContext: {}

services:
  namesrv:
    enabled: true
    type: ClusterIP
    port: 9876
  broker:
    enabled: true
    type: ClusterIP
    ports:
      - name: fastlisten
        port: 10909
      - name: listen
        port: 10911
      - name: halisten
        port: 10912
  dashboard:
    enabled: true
    type: ClusterIP
    port: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

resources: {}

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

persistence:
  enabled: false
  size: 10Gi
  storageClass: ""

config:
  broker_conf: /opt/rocketmq-5.2.0/conf/broker.conf
