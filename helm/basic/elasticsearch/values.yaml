replicaCount: 1

image:
  repository: elasticsearch
  pullPolicy: IfNotPresent
  tag: "8.16.0"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  fsGroup: 1000

securityContext:
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false
  allowPrivilegeEscalation: false

service:
  type: ClusterIP
  port: 9200

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

resources:
  limits:
    memory: 2048M
  requests:
    memory: 512M

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

persistence:
  enabled: true
  size: 10Gi
  storageClass: ""

config:
  node.name: es
  cluster.name: elasticsearch
  discovery.type: single-node
  ELASTIC_PASSWORD: "123456"
  xpack.security.enabled: false
  ES_JAVA_OPTS: -Xlog:disable -Xlog:gc=debug:stderr -Xms512m -Xmx512m
