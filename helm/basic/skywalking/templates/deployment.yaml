apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "skywalking.oap.fullname" . }}
  labels:
    {{- include "skywalking.labels" . | nindent 4 }}
    component: oap
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "skywalking.selectorLabels" . | nindent 6 }}
      component: oap
  template:
    metadata:
      labels:
        {{- include "skywalking.selectorLabels" . | nindent 8 }}
        component: oap
    spec:
      serviceAccountName: {{ include "skywalking.serviceAccountName" . }}
      containers:
        - name: oap
          image: "{{ .Values.image.oap.repository }}:{{ .Values.image.oap.tag }}"
          imagePullPolicy: {{ .Values.image.oap.pullPolicy }}
          ports:
            {{- toYaml .Values.oap.service.ports | nindent 12 }}
          env:
            {{- toYaml .Values.oap.env | nindent 12 }}
          resources:
            {{- toYaml .Values.oap.resources | nindent 12 }}
          livenessProbe:
            tcpSocket:
              port: 11800
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 12800
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "skywalking.ui.fullname" . }}
  labels:
    {{- include "skywalking.labels" . | nindent 4 }}
    component: ui
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "skywalking.selectorLabels" . | nindent 6 }}
      component: ui
  template:
    metadata:
      labels:
        {{- include "skywalking.selectorLabels" . | nindent 8 }}
        component: ui
    spec:
      serviceAccountName: {{ include "skywalking.serviceAccountName" . }}
      containers:
        - name: ui
          image: "{{ .Values.image.ui.repository }}:{{ .Values.image.ui.tag }}"
          imagePullPolicy: {{ .Values.image.ui.pullPolicy }}
          ports:
            - containerPort: 8080
              name: http
          env:
            {{- toYaml .Values.ui.env | nindent 12 }}
          resources:
            {{- toYaml .Values.ui.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
