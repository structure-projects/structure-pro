name: rabbitmq
description: RabbitMQ Message Broker
region: cn-north-4
project: {project}
function:
  name: rabbitmq
  description: RabbitMQ Message Broker
  runtime: CustomImage
  handler: ''
  memorySize: 2048
  timeout: 300
  codeType: CustomImage
  customImage:
    image: rabbitmq:management
    port: 5672
  environmentVariables:

  vpcId: ''
  subnetId: ''
  enterpriseProjectId: default
  agency: ''
  xrole: ''
  concurrency:
    strategy: dynamic
    maxConcurrent: 100
  triggers:
    - triggerType: APIG
      eventData:
        auth: IAM
        name: rabbitmq-apig
        protocol: HTTP
        timeout: 5000
