appId: {appId}
component: scf
name: mssql
stage: prod
org: {org}
app: mssql-app
inputs:
  name: mssql
  src:
    src: ./
    exclude:
      - .env
  region: ap-guangzhou
  runtime: CustomContainer
  description: Microsoft SQL Server
  namespace: default
  type: web
  memorySize: 4096
  timeout: 600
  initTimeout: 300
  cls:
    logsetId: ''
    topicId: ''
  layers: []
  environment:
    variables:
      ACCEPT_EULA: Y

  containerConf:
    image: mcr.microsoft.com/mssql/server:2022-latest
    containerPort: 1433
    imageTag: latest
  vpcConfig:
    vpcId: ''
    subnetId: ''
  triggers:
    - type: apigw
      parameters:
        name: mssql-apigw
        protocols:
          - http
          - https
        serviceName: serverless
        description: API Gateway trigger for mssql
        environment: release
        endPoints:
          - path: /
            method: ANY
