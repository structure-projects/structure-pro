appId: {appId}
component: scf
name: seata
stage: prod
org: {org}
app: seata-app
inputs:
  name: seata
  src:
    src: ./
    exclude:
      - .env
  region: ap-guangzhou
  runtime: CustomContainer
  description: Seata Distributed Transaction
  namespace: default
  type: web
  memorySize: 2048
  timeout: 300
  initTimeout: 300
  cls:
    logsetId: ''
    topicId: ''
  layers: []
  environment:
    variables:

  containerConf:
    image: seataio/seata-server:latest
    containerPort: 8091
    imageTag: latest
  vpcConfig:
    vpcId: ''
    subnetId: ''
  triggers:
    - type: apigw
      parameters:
        name: seata-apigw
        protocols:
          - http
          - https
        serviceName: serverless
        description: API Gateway trigger for seata
        environment: release
        endPoints:
          - path: /
            method: ANY
