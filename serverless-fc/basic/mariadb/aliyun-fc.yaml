edition: 3.0.0
name: mariadb-service
access: default
vars:
  region: cn-hangzhou
  service:
    name: mariadb
    description: MariaDB Database
    internetAccess: true
  function:
    name: mariadb
    description: MariaDB Database
    runtime: custom-container
    cpu: 1
    memorySize: 2048
    timeout: 300
    caPort: 3306
    customContainerConfig:
      image: mariadb:latest
      command: []
      args: []
      accelerationType: Default
      webServerMode: true
  triggers:
    - name: httpTrigger
      type: http
      qualifier: LATEST
      description: HTTP Trigger
      httpTriggerConfig:
        authType: anonymous
        methods:
          - GET
          - POST
          - PUT
          - DELETE
          - HEAD
          - PATCH
          - OPTIONS
resources:
  mariadb:
    component: fc3
    props:
      region: ${vars.region}
      description: ${vars.service.description}
      internetAccess: ${vars.service.internetAccess}
      role: acs:ram::{accountId}:role/AliyunFCDefaultRole
      logConfig:
        enableInstanceMetrics: false
        enableRequestMetrics: false
      vpcConfig:
        vpcId: ''
        vswitchIds: []
        securityGroupId: ''
      nasConfig:
        userId: -1
        groupId: -1
        mountPoints: []
      functionName: ${vars.function.name}
      description: ${vars.function.description}
      runtime: ${vars.function.runtime}
      cpu: ${vars.function.cpu}
      memorySize: ${vars.function.memorySize}
      timeout: ${vars.function.timeout}
      codeUri: ./
      caPort: ${vars.function.caPort}
      customContainerConfig: ${vars.function.customContainerConfig}
      environmentVariables:

      triggers: ${vars.triggers}
