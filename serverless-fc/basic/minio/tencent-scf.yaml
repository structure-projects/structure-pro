appId: {appId}
component: scf
name: minio
stage: prod
org: {org}
app: minio-app
inputs:
  name: minio
  src:
    src: ./
    exclude:
      - .env
  region: ap-guangzhou
  runtime: CustomContainer
  description: MinIO Object Storage
  namespace: default
  type: web
  memorySize: 2048
  timeout: 300
  initTimeout: 300
  cls:
    logsetId: ''
    topicId: ''
  layers: []
  environment:
    variables:

  containerConf:
    image: minio/minio:latest
    containerPort: 9000
    imageTag: latest
  vpcConfig:
    vpcId: ''
    subnetId: ''
  triggers:
    - type: apigw
      parameters:
        name: minio-apigw
        protocols:
          - http
          - https
        serviceName: serverless
        description: API Gateway trigger for minio
        environment: release
        endPoints:
          - path: /
            method: ANY
