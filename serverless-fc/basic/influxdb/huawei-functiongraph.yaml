name: influxdb
description: InfluxDB Time Series Database
region: cn-north-4
project: {project}
function:
  name: influxdb
  description: InfluxDB Time Series Database
  runtime: CustomImage
  handler: ''
  memorySize: 2048
  timeout: 300
  codeType: CustomImage
  customImage:
    image: influxdb:latest
    port: 8086
  environmentVariables:

  vpcId: ''
  subnetId: ''
  enterpriseProjectId: default
  agency: ''
  xrole: ''
  concurrency:
    strategy: dynamic
    maxConcurrent: 100
  triggers:
    - triggerType: APIG
      eventData:
        auth: IAM
        name: influxdb-apig
        protocol: HTTP
        timeout: 5000
