appId: {appId}
component: scf
name: clickhouse
stage: prod
org: {org}
app: clickhouse-app
inputs:
  name: clickhouse
  src:
    src: ./
    exclude:
      - .env
  region: ap-guangzhou
  runtime: CustomContainer
  description: ClickHouse Database Service
  namespace: default
  type: web
  memorySize: 4096
  timeout: 600
  initTimeout: 300
  cls:
    logsetId: ''
    topicId: ''
  layers: []
  environment:
    variables:

  containerConf:
    image: clickhouse/clickhouse-server:latest
    containerPort: 8123
    imageTag: latest
  vpcConfig:
    vpcId: ''
    subnetId: ''
  triggers:
    - type: apigw
      parameters:
        name: clickhouse-apigw
        protocols:
          - http
          - https
        serviceName: serverless
        description: API Gateway trigger for clickhouse
        environment: release
        endPoints:
          - path: /
            method: ANY
