name: elasticsearch
description: Elasticsearch Search Engine
region: cn-north-4
project: {project}
function:
  name: elasticsearch
  description: Elasticsearch Search Engine
  runtime: CustomImage
  handler: ''
  memorySize: 4096
  timeout: 600
  codeType: CustomImage
  customImage:
    image: elasticsearch:8.12.0
    port: 9200
  environmentVariables:
    discovery.type: single-node

  vpcId: ''
  subnetId: ''
  enterpriseProjectId: default
  agency: ''
  xrole: ''
  concurrency:
    strategy: dynamic
    maxConcurrent: 100
  triggers:
    - triggerType: APIG
      eventData:
        auth: IAM
        name: elasticsearch-apig
        protocol: HTTP
        timeout: 5000
