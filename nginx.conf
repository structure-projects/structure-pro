upstream gw_test {
    server 192.168.0.153:18001;
}
upstream gw_prod {
    server 192.168.0.153:18001;
}
server {
    listen 80 ;
    server_name ~^api\.(?<env>\w+)\.(?<tenant>\w+)\.structured\.cn$;
    # ✅ 必须先声明变量
    set $gateway "";
    access_by_lua_block {
        local env = ngx.var.env
        local tenant = ngx.var.tenant
        if not env or not tenant then
            ngx.status = 400
            ngx.say("invalid domain")
            return ngx.exit(400)
        end
        -- 透传给后端
        ngx.req.set_header("X-Tenant-Id", tenant)
        ngx.req.set_header("X-Env", env)
        -- ✅ 设置 Nginx 变量（不是 ngx.ctx）
        if env == "test" then
            ngx.var.gateway = "gw_test"
        elseif env == "prod" then
            ngx.var.gateway = "gw_prod"
        else
            ngx.status = 403
            ngx.say("unsupported environment")
            return ngx.exit(403)
        end
    }
    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        # ✅ 正确
        proxy_pass http://$gateway;
    }
    add_header Strict-Transport-Security "max-age=31536000";
}