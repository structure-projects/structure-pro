groups:
  - name: service_health
    interval: 30s
    rules:
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
          service: "{{ $labels.job }}"
        annotations:
          summary: "服务 {{ $labels.instance }} 已停止"
          description: "{{ $labels.job }} 服务已停止超过 1 分钟"

      - alert: HighMemoryUsage
        expr: (container_memory_usage_bytes / container_spec_memory_limit_bytes) > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "内存使用率过高"
          description: "实例 {{ $labels.instance }} 内存使用率超过 90%"

      - alert: HighCPUUsage
        expr: rate(process_cpu_seconds_total[5m]) * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "CPU 使用率过高"
          description: "实例 {{ $labels.instance }} CPU 使用率超过 80%"

  - name: nacos_health
    interval: 30s
    rules:
      - alert: NacosDown
        expr: absent(up{job="nacos"})
        for: 1m
        labels:
          severity: critical
          service: nacos
        annotations:
          summary: "Nacos 服务不可用"
          description: "Nacos 注册中心已停止运行"

      - alert: NacosInstanceCountLow
        expr: count(up{job=~".*"}) by (job) < 1
        for: 2m
        labels:
          severity: warning
          service: nacos
        annotations:
          summary: "Nacos 实例数量过低"
          description: "服务 {{ $labels.job }} 实例数量低于预期"

  - name: infrastructure
    interval: 30s
    rules:
      - alert: ElasticsearchClusterRed
        expr: elasticsearch_cluster_health_status == 2
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Elasticsearch 集群状态不健康"
          description: "Elasticsearch 集群状态为 red"

      - alert: KafkaBrokerDown
        expr: absent(kafka_broker_info)
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Kafka Broker 不可用"
          description: "Kafka 消息队列 Broker 已停止"

      - alert: RabbitMQDown
        expr: absent(rabbitmq_up)
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "RabbitMQ 服务不可用"
          description: "RabbitMQ 消息队列已停止"

  - name: skywalking_health
    interval: 60s
    rules:
      - alert: SkyWalkingOAPDown
        expr: absent(up{job="skywalking-oap"})
        for: 1m
        labels:
          severity: critical
          service: skywalking
        annotations:
          summary: "SkyWalking OAP 服务不可用"
          description: "SkyWalking 链路追踪服务已停止"
