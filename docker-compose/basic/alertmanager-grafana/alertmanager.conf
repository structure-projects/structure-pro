global:
  resolve_timeout: 5m
  smtp_smarthost: 'smtp.example.com:587'
  smtp_from: 'alert@example.com'
  smtp_auth_username: 'alert@example.com'
  smtp_auth_password: 'password'

route:
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 12h
  receiver: 'default'
  routes:
    - match:
        severity: critical
      receiver: 'critical-alerts'
      continue: true
    - match:
        severity: warning
      receiver: 'warning-alerts'
      continue: true
    - match:
        service: nacos
      receiver: 'nacos-alerts'
    - match:
        service: skywalking
      receiver: 'skywalking-alerts'

receivers:
  - name: 'default'
    webhook_configs:
      - url: 'http://webhook-server:8080/webhook'
        send_resolved: true

  - name: 'critical-alerts'
    webhook_configs:
      - url: 'http://webhook-server:8080/webhook/critical'
        send_resolved: true
    # email_configs:
    #   - to: 'admin@example.com'

  - name: 'warning-alerts'
    webhook_configs:
      - url: 'http://webhook-server:8080/webhook/warning'
        send_resolved: true

  - name: 'nacos-alerts'
    webhook_configs:
      - url: 'http://webhook-server:8080/webhook/nacos'
        send_resolved: true

  - name: 'skywalking-alerts'
    webhook_configs:
      - url: 'http://webhook-server:8080/webhook/skywalking'
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']
