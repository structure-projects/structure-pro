input {
  beats {
    port => 5044
    codec => json
  }

  tcp {
    port => 5000
    codec => json
  }

  kafka {
    bootstrap_servers => "kafka:9092"
    topics => ["app-logs", "access-logs", "error-logs"]
    codec => json
    group_id => "logstash-consumers"
    consumer_threads => 4
  }
}

filter {
  if [logger_name] =~ /org\.springcloud/ {
    mutate {
      add_tag => ["springcloud"]
    }
  }

  if [level] == "ERROR" {
    mutate {
      add_tag => ["error"]
      add_field => { "alert" => "true" }
    }
  }

  json {
    source => "message"
    target => "parsed"
  }

  date {
    match => ["timestamp", "ISO8601", "yyyy-MM-dd HH:mm:ss.SSS"]
    target => "@timestamp"
  }

  mutate {
    rename => { "host" => "server_ip" }
    remove_field => ["@version"]
  }

  if [trace_id] {
    mutate {
      add_field => { "trace_id" => "%{trace_id}" }
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "app-logs-%{+YYYY.MM.dd}"
    user => "elastic"
    password => "123456"
    document_type => "_doc"
  }

  if "error" in [tags] {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "error-logs-%{+YYYY.MM.dd}"
      user => "elastic"
      password => "123456"
    }
  }

  stdout {
    codec => rubydebug
  }
}
