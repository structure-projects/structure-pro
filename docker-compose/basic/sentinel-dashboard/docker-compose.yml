networks:
    structure-cloud-work:
        external: true
services:
    sentinel-dashboard:
        container_name: ${CONTAINER_NAME}
        hostname: sentinel-dashboard
        deploy:
            placement:
              constraints:
                - node.role == worker
        image: bladex/sentinel-dashboard:1.8.8
        labels:
            createdBy: Apps
        networks:
            - structure-cloud-work
        ports:
            - ${PANEL_APP_PORT_HTTP}:8858
            - ${PANEL_APP_PORT_COMMUNICATION}:8719
        restart: always
