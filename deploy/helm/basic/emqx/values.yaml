replicaCount: 1

image:
  repository: emqx/emqx
  pullPolicy: IfNotPresent
  tag: "5.8.2"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext: {}

securityContext:
  runAsUser: 0

service:
  type: ClusterIP
  ports:
    - name: dashboard
      port: 18083
      targetPort: 18083
    - name: mqtt-1883
      port: 1883
      targetPort: 1883
    - name: ws-8083
      port: 8083
      targetPort: 8083
    - name: wss-8084
      port: 8084
      targetPort: 8084
    - name: ssl-8883
      port: 8883
      targetPort: 8883

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

resources: {}

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

persistence:
  enabled: false
  size: 10Gi
  storageClass: ""
