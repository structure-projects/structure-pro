apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "istio.istiod.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "istio.labels" . | nindent 4 }}
    component: istiod
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "istio.selectorLabels" . | nindent 6 }}
      component: istiod
  template:
    metadata:
      labels:
        {{- include "istio.selectorLabels" . | nindent 8 }}
        component: istiod
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "15014"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: {{ include "istio.istiod.fullname" . }}-sa
      containers:
        - name: discovery
          image: "{{ .Values.istiod.image.repository }}:{{ .Values.istiod.image.tag }}"
          imagePullPolicy: {{ .Values.istiod.image.pullPolicy }}
          ports:
            - containerPort: 15010
            - containerPort: 15012
            - containerPort: 15014
          args:
            - discovery
            - --monitoringPort=15014
            - --log_output_level=default:info
            - --domain=cluster.local
            {{- if .Values.tracing.enabled }}
            - --trace_collector={{ .Values.tracing.zipkin.address }}
            {{- end }}
          resources:
            {{- toYaml .Values.istiod.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /live
              port: 15014
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 15014
            initialDelaySeconds: 5
            periodSeconds: 5
---
{{- if .Values.istio_gateway.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "istio.gateway.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "istio.labels" . | nindent 4 }}
    component: gateway
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "istio.selectorLabels" . | nindent 6 }}
      component: gateway
  template:
    metadata:
      labels:
        {{- include "istio.selectorLabels" . | nindent 8 }}
        component: gateway
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      serviceAccountName: {{ include "istio.gateway.fullname" . }}-sa
      containers:
        - name: istio-proxy
          image: "{{ .Values.istio_gateway.image.repository }}:{{ .Values.istio_gateway.image.tag }}"
          imagePullPolicy: {{ .Values.istio_gateway.image.pullPolicy }}
          ports:
            {{- toYaml .Values.istio_gateway.service.ports | nindent 12 }}
          env:
            {{- toYaml .Values.istio_gateway.env | nindent 12 }}
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: ISTIO_META_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: ISTIO_META_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            {{- toYaml .Values.istio_gateway.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
{{- end }}
