apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "alertmanager-grafana.alertmanager.fullname" . }}-config
  labels:
    {{- include "alertmanager-grafana.labels" . | nindent 4 }}
data:
  alertmanager.yml: |
{{ .Values.alertmanager.config | toYaml | indent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "alertmanager-grafana.grafana.fullname" . }}-datasources
  labels:
    {{- include "alertmanager-grafana.labels" . | nindent 4 }}
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
{{- range .Values.grafana.datasources }}
      - name: {{ .name }}
        type: {{ .type }}
        url: {{ .url }}
        isDefault: {{ .isDefault }}
        jsonData:
{{- with .jsonData }}
{{ toYaml . | indent 8 }}
{{- end }}
{{- if .database }}
        database: {{ .database }}
{{- end }}
{{- end }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "alertmanager-grafana.grafana.fullname" . }}-dashboards
  labels:
    {{- include "alertmanager-grafana.labels" . | nindent 4 }}
data:
  dashboard.yml: |
    apiVersion: 1
    providers:
      - name: 'default'
        orgId: 1
        folder: ''
        type: file
        options:
          path: /var/lib/grafana/dashboards
