replicaCount: 1

alertmanager:
  image:
    repository: prom/alertmanager
    pullPolicy: IfNotPresent
    tag: "v0.27.0"

  service:
    type: ClusterIP
    ports:
      - name: http
        port: 9093
        targetPort: 9093
      - name: cluster
        port: 9094
        targetPort: 9094

  resources: {}
    # limits:
    #   cpu: 500m
    #   memory: 512Mi
    # requests:
    #   cpu: 100m
    #   memory: 128Mi

  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ['alertname', 'cluster', 'service']
      group_wait: 10s
      group_interval: 10s
      repeat_interval: 12h
      receiver: 'default'
    receivers:
      - name: 'default'
        webhook_configs:
          - url: 'http://webhook-server:8080/webhook'
            send_resolved: true

  persistence:
    enabled: true
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 1Gi

grafana:
  image:
    repository: grafana/grafana
    pullPolicy: IfNotPresent
    tag: "10.4.0"

  service:
    type: ClusterIP
    port: 3000

  adminUser: admin
  adminPassword: admin123

  persistence:
    enabled: true
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 5Gi

  datasources:
    - name: Prometheus
      type: prometheus
      url: http://prometheus:9090
      isDefault: true
      jsonData:
        timeInterval: "15s"
        httpMethod: POST

    - name: Elasticsearch
      type: elasticsearch
      url: http://elasticsearch:9200
      database: logs-*
      jsonData:
        timeField: "@timestamp"
        esVersion: 8

  dashboardProviders:
    dashboard1:
      folder: ""
      type: file
      options:
        path: /var/lib/grafana/dashboards

  dashboards:
    infrastructure:
      title: "Infrastructure Dashboard"
      uid: infrastructure
      datasource: Prometheus
      json: {}
        # Will be populated from ConfigMap

  ingress:
    enabled: true
    className: "nginx"
    annotations:
      nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
      nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    hosts:
      - host: grafana.local
        paths:
          - path: /
            pathType: Prefix
    tls: []

  resources: {}
    # limits:
    #   cpu: 1000m
    #   memory: 1Gi
    # requests:
    #   cpu: 250m
    #   memory: 256Mi

  plugins:
    - grafana-piechart-panel
    - grafana-clock-panel

serviceAccount:
  create: true
  annotations: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  tls: []

resources: {}

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}
