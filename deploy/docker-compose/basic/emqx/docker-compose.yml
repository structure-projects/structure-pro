networks:
    structure-cloud-work:
        external: true
services:
    emqx:
        container_name: ${CONTAINER_NAME}
        deploy:
            resources:
                limits:
                    cpus: ${CPUS}
                    memory: ${MEMORY_LIMIT}
            placement:
                constraints:
                    - node.role == worker
        environment:
            - EMQX_NODE_NAME=emqx@${CONTAINER_NAME}
        image: emqx/emqx:5.8.2
        labels:
            createdBy: Apps
        networks:
            - structure-cloud-work
        ports:
            - ${HOST_IP}:${PANEL_APP_PORT_HTTP}:18083
            - ${HOST_IP}:${EMQX_PORT_1883}:1883
            - ${HOST_IP}:${EMQX_PORT_8083}:8083
            - ${HOST_IP}:${EMQX_PORT_8084}:8084
            - ${HOST_IP}:${EMQX_PORT_8883}:8883
        restart: always
        user: "0"
        volumes:
            - ./data:/opt/emqx/data
            - ./log:/opt/emqx/log
