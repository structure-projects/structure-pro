networks:
    structure-cloud-work:
        external: true
services:
    sentinel-dashboard:
        container_name: ${CONTAINER_NAME}
        deploy:
            resources:
                limits:
                    cpus: ${CPUS}
                    memory: ${MEMORY_LIMIT}
            placement:
              constraints:
                - node.role == worker
        image: bladex/sentinel-dashboard:1.8.8
        labels:
            createdBy: Apps
        networks:
            - structure-cloud-work
        ports:
            - ${HOST_IP}:${PANEL_APP_PORT_HTTP}:8858
            - ${HOST_IP}:${PANEL_APP_PORT_COMMUNICATION}:8719
        restart: always
