networks:
    1panel-network:
        external: true
services:
    rabbitmq:
        container_name: ${CONTAINER_NAME}
        deploy:
            resources:
                limits:
                    cpus: ${CPUS}
                    memory: ${MEMORY_LIMIT}
        environment:
            - RABBITMQ_DEFAULT_USER=${RABBITMQ_DEFAULT_USER}
            - RABBITMQ_DEFAULT_PASS=${RABBITMQ_DEFAULT_PASS}
        hostname: rabbitmq
        image: rabbitmq:4.0.3-management-alpine
        labels:
            createdBy: Apps
        networks:
            - 1panel-network
        ports:
            - ${HOST_IP}:${PANEL_APP_PORT_SERVICE}:5672
            - ${HOST_IP}:${PANEL_APP_PORT_HTTP}:15672
        restart: always
        volumes:
            - ./data/:/var/lib/rabbitmq/
            - ./log/:/var/log/rabbitmq
