name: it-tools
description: IT Tools
region: cn-north-4
project: {project}
function:
  name: it-tools
  description: IT Tools
  runtime: CustomImage
  handler: ''
  memorySize: 1024
  timeout: 300
  codeType: CustomImage
  customImage:
    image: corentinth/it-tools:latest
    port: 80
  environmentVariables:

  vpcId: ''
  subnetId: ''
  enterpriseProjectId: default
  agency: ''
  xrole: ''
  concurrency:
    strategy: dynamic
    maxConcurrent: 100
  triggers:
    - triggerType: APIG
      eventData:
        auth: IAM
        name: it-tools-apig
        protocol: HTTP
        timeout: 5000
