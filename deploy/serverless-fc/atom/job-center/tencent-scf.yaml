appId: {appId}
component: scf
name: job-center
stage: prod
org: {org}
app: job-center-app
inputs:
  name: job-center
  src:
    src: ./
    exclude:
      - .env
  region: ap-guangzhou
  runtime: CustomContainer
  description: Job Center Service
  namespace: default
  type: web
  memorySize: 2048
  timeout: 300
  initTimeout: 300
  cls:
    logsetId: ''
    topicId: ''
  layers: []
  environment:
    variables:
      JAVA_OPTS: -Xms256m -Xmx1024m
      PARAMS: -Dfile.encoding=UTF-8 -Dspring.profiles.active=prod -Djava.security.egd=file:/dev/./urandom -Duser.timezone=Asia/Shanghai

  containerConf:
    image: registry.cn-hangzhou.aliyuncs.com/structured/structured-job-center:latest
    containerPort: 8080
    imageTag: latest
  vpcConfig:
    vpcId: ''
    subnetId: ''
  triggers:
    - type: apigw
      parameters:
        name: job-center-apigw
        protocols:
          - http
          - https
        serviceName: serverless
        description: API Gateway trigger for job-center
        environment: release
        endPoints:
          - path: /
            method: ANY
