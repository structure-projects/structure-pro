appId: {appId}
component: scf
name: sentinel-dashboard
stage: prod
org: {org}
app: sentinel-dashboard-app
inputs:
  name: sentinel-dashboard
  src:
    src: ./
    exclude:
      - .env
  region: ap-guangzhou
  runtime: CustomContainer
  description: Sentinel Dashboard
  namespace: default
  type: web
  memorySize: 2048
  timeout: 300
  initTimeout: 300
  cls:
    logsetId: ''
    topicId: ''
  layers: []
  environment:
    variables:

  containerConf:
    image: sentinel-dashboard:latest
    containerPort: 8858
    imageTag: latest
  vpcConfig:
    vpcId: ''
    subnetId: ''
  triggers:
    - type: apigw
      parameters:
        name: sentinel-dashboard-apigw
        protocols:
          - http
          - https
        serviceName: serverless
        description: API Gateway trigger for sentinel-dashboard
        environment: release
        endPoints:
          - path: /
            method: ANY
