name: sentinel-dashboard
description: Sentinel Dashboard
region: cn-north-4
project: {project}
function:
  name: sentinel-dashboard
  description: Sentinel Dashboard
  runtime: CustomImage
  handler: ''
  memorySize: 2048
  timeout: 300
  codeType: CustomImage
  customImage:
    image: sentinel-dashboard:latest
    port: 8858
  environmentVariables:

  vpcId: ''
  subnetId: ''
  enterpriseProjectId: default
  agency: ''
  xrole: ''
  concurrency:
    strategy: dynamic
    maxConcurrent: 100
  triggers:
    - triggerType: APIG
      eventData:
        auth: IAM
        name: sentinel-dashboard-apig
        protocol: HTTP
        timeout: 5000
