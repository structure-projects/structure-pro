name: mariadb
description: MariaDB Database
region: cn-north-4
project: {project}
function:
  name: mariadb
  description: MariaDB Database
  runtime: CustomImage
  handler: ''
  memorySize: 2048
  timeout: 300
  codeType: CustomImage
  customImage:
    image: mariadb:latest
    port: 3306
  environmentVariables:

  vpcId: ''
  subnetId: ''
  enterpriseProjectId: default
  agency: ''
  xrole: ''
  concurrency:
    strategy: dynamic
    maxConcurrent: 100
  triggers:
    - triggerType: APIG
      eventData:
        auth: IAM
        name: mariadb-apig
        protocol: HTTP
        timeout: 5000
