name: emqx
description: EMQX MQTT Broker
region: cn-north-4
project: {project}
function:
  name: emqx
  description: EMQX MQTT Broker
  runtime: CustomImage
  handler: ''
  memorySize: 2048
  timeout: 300
  codeType: CustomImage
  customImage:
    image: emqx/emqx:latest
    port: 1883
  environmentVariables:

  vpcId: ''
  subnetId: ''
  enterpriseProjectId: default
  agency: ''
  xrole: ''
  concurrency:
    strategy: dynamic
    maxConcurrent: 100
  triggers:
    - triggerType: APIG
      eventData:
        auth: IAM
        name: emqx-apig
        protocol: HTTP
        timeout: 5000
