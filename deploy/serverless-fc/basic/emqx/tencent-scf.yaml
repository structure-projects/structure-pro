appId: {appId}
component: scf
name: emqx
stage: prod
org: {org}
app: emqx-app
inputs:
  name: emqx
  src:
    src: ./
    exclude:
      - .env
  region: ap-guangzhou
  runtime: CustomContainer
  description: EMQX MQTT Broker
  namespace: default
  type: web
  memorySize: 2048
  timeout: 300
  initTimeout: 300
  cls:
    logsetId: ''
    topicId: ''
  layers: []
  environment:
    variables:

  containerConf:
    image: emqx/emqx:latest
    containerPort: 1883
    imageTag: latest
  vpcConfig:
    vpcId: ''
    subnetId: ''
  triggers:
    - type: apigw
      parameters:
        name: emqx-apigw
        protocols:
          - http
          - https
        serviceName: serverless
        description: API Gateway trigger for emqx
        environment: release
        endPoints:
          - path: /
            method: ANY
