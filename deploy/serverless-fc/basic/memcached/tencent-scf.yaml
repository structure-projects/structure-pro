appId: {appId}
component: scf
name: memcached
stage: prod
org: {org}
app: memcached-app
inputs:
  name: memcached
  src:
    src: ./
    exclude:
      - .env
  region: ap-guangzhou
  runtime: CustomContainer
  description: Memcached Cache Service
  namespace: default
  type: web
  memorySize: 1024
  timeout: 300
  initTimeout: 300
  cls:
    logsetId: ''
    topicId: ''
  layers: []
  environment:
    variables:

  containerConf:
    image: memcached:latest
    containerPort: 11211
    imageTag: latest
  vpcConfig:
    vpcId: ''
    subnetId: ''
  triggers:
    - type: apigw
      parameters:
        name: memcached-apigw
        protocols:
          - http
          - https
        serviceName: serverless
        description: API Gateway trigger for memcached
        environment: release
        endPoints:
          - path: /
            method: ANY
