name: kong-gateway
description: Kong API Gateway
region: cn-north-4
project: {project}
function:
  name: kong-gateway
  description: Kong API Gateway
  runtime: CustomImage
  handler: ''
  memorySize: 2048
  timeout: 300
  codeType: CustomImage
  customImage:
    image: kong:latest
    port: 8000
  environmentVariables:

  vpcId: ''
  subnetId: ''
  enterpriseProjectId: default
  agency: ''
  xrole: ''
  concurrency:
    strategy: dynamic
    maxConcurrent: 100
  triggers:
    - triggerType: APIG
      eventData:
        auth: IAM
        name: kong-gateway-apig
        protocol: HTTP
        timeout: 5000
