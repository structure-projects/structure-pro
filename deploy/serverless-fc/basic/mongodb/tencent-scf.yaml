appId: {appId}
component: scf
name: mongodb
stage: prod
org: {org}
app: mongodb-app
inputs:
  name: mongodb
  src:
    src: ./
    exclude:
      - .env
  region: ap-guangzhou
  runtime: CustomContainer
  description: MongoDB NoSQL Database
  namespace: default
  type: web
  memorySize: 2048
  timeout: 300
  initTimeout: 300
  cls:
    logsetId: ''
    topicId: ''
  layers: []
  environment:
    variables:

  containerConf:
    image: mongo:latest
    containerPort: 27017
    imageTag: latest
  vpcConfig:
    vpcId: ''
    subnetId: ''
  triggers:
    - type: apigw
      parameters:
        name: mongodb-apigw
        protocols:
          - http
          - https
        serviceName: serverless
        description: API Gateway trigger for mongodb
        environment: release
        endPoints:
          - path: /
            method: ANY
