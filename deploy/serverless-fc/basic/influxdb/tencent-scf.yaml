appId: {appId}
component: scf
name: influxdb
stage: prod
org: {org}
app: influxdb-app
inputs:
  name: influxdb
  src:
    src: ./
    exclude:
      - .env
  region: ap-guangzhou
  runtime: CustomContainer
  description: InfluxDB Time Series Database
  namespace: default
  type: web
  memorySize: 2048
  timeout: 300
  initTimeout: 300
  cls:
    logsetId: ''
    topicId: ''
  layers: []
  environment:
    variables:

  containerConf:
    image: influxdb:latest
    containerPort: 8086
    imageTag: latest
  vpcConfig:
    vpcId: ''
    subnetId: ''
  triggers:
    - type: apigw
      parameters:
        name: influxdb-apigw
        protocols:
          - http
          - https
        serviceName: serverless
        description: API Gateway trigger for influxdb
        environment: release
        endPoints:
          - path: /
            method: ANY
