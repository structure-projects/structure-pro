name: minio
description: MinIO Object Storage
region: cn-north-4
project: {project}
function:
  name: minio
  description: MinIO Object Storage
  runtime: CustomImage
  handler: ''
  memorySize: 2048
  timeout: 300
  codeType: CustomImage
  customImage:
    image: minio/minio:latest
    port: 9000
  environmentVariables:

  vpcId: ''
  subnetId: ''
  enterpriseProjectId: default
  agency: ''
  xrole: ''
  concurrency:
    strategy: dynamic
    maxConcurrent: 100
  triggers:
    - triggerType: APIG
      eventData:
        auth: IAM
        name: minio-apig
        protocol: HTTP
        timeout: 5000
