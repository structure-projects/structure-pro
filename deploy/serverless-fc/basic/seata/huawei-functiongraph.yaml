name: seata
description: Seata Distributed Transaction
region: cn-north-4
project: {project}
function:
  name: seata
  description: Seata Distributed Transaction
  runtime: CustomImage
  handler: ''
  memorySize: 2048
  timeout: 300
  codeType: CustomImage
  customImage:
    image: seataio/seata-server:latest
    port: 8091
  environmentVariables:

  vpcId: ''
  subnetId: ''
  enterpriseProjectId: default
  agency: ''
  xrole: ''
  concurrency:
    strategy: dynamic
    maxConcurrent: 100
  triggers:
    - triggerType: APIG
      eventData:
        auth: IAM
        name: seata-apig
        protocol: HTTP
        timeout: 5000
