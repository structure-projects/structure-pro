appId: {appId}
component: scf
name: neo4j
stage: prod
org: {org}
app: neo4j-app
inputs:
  name: neo4j
  src:
    src: ./
    exclude:
      - .env
  region: ap-guangzhou
  runtime: CustomContainer
  description: Neo4j Graph Database
  namespace: default
  type: web
  memorySize: 2048
  timeout: 300
  initTimeout: 300
  cls:
    logsetId: ''
    topicId: ''
  layers: []
  environment:
    variables:

  containerConf:
    image: neo4j:latest
    containerPort: 7474
    imageTag: latest
  vpcConfig:
    vpcId: ''
    subnetId: ''
  triggers:
    - type: apigw
      parameters:
        name: neo4j-apigw
        protocols:
          - http
          - https
        serviceName: serverless
        description: API Gateway trigger for neo4j
        environment: release
        endPoints:
          - path: /
            method: ANY
