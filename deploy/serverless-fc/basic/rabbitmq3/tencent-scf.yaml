appId: {appId}
component: scf
name: rabbitmq3
stage: prod
org: {org}
app: rabbitmq3-app
inputs:
  name: rabbitmq3
  src:
    src: ./
    exclude:
      - .env
  region: ap-guangzhou
  runtime: CustomContainer
  description: RabbitMQ 3 Message Broker
  namespace: default
  type: web
  memorySize: 2048
  timeout: 300
  initTimeout: 300
  cls:
    logsetId: ''
    topicId: ''
  layers: []
  environment:
    variables:

  containerConf:
    image: rabbitmq:3-management
    containerPort: 5672
    imageTag: latest
  vpcConfig:
    vpcId: ''
    subnetId: ''
  triggers:
    - type: apigw
      parameters:
        name: rabbitmq3-apigw
        protocols:
          - http
          - https
        serviceName: serverless
        description: API Gateway trigger for rabbitmq3
        environment: release
        endPoints:
          - path: /
            method: ANY
